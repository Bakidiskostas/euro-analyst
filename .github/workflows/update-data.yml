name: Update data daily

on:
  schedule:
    - cron: "20 5 1,15 * *"   # 1st and 15th of every month at 05:20 UTC
  workflow_dispatch:        # allow manual run from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch data
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
        run: python fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name "data-bot"
          git config user.email "actions@github.com"
          git add data/data.json
          git diff --cached --quiet || git commit -m "chore: daily data refresh"
          git push
